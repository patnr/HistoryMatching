[tool.ruff.lint]
ignore = ["E501"]

# unfixable = ["B"]

[tool.ruff.lint.per-file-ignores]
"Optimise*.py" = [
  "E402", # "import not at top of file"
  "E703", # "statement ends with a semicolon"
  "F401", # "imported but unused"
  "F811", # "redefinition of unused name"
]
# "**/{tests,docs,tools}/*" = ["E402"]

